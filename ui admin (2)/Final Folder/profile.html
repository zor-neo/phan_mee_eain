<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile - Admin Dashboard</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f4f4f4;
        }

        /* User Custom Colors */
        .text-purple { color: #76b9d8 !important; }
        .bg-purple { background-color: #76b9d8 !important; color: #fff; }
        .bg-purple:hover { background-color: #4db4e3 !important; color: #fff; }
        
        .bg-orange { background-color: #1c8233 !important; color: #fff; }
        .bg-orange:hover { background-color: #156627 !important; color: #fff; }

        /* Sidebar Control */
        .sidebar {
            width: 250px;
            z-index: 1045;
        }
        @media (min-width: 768px) {
            .main-content {
                margin-left: 250px;
                width: calc(100% - 250px);
            }
        }

        .nav-link-custom { transition: 0.3s; }
        .nav-link-custom:hover, .nav-link-custom.active {
            background-color: #f4f4f4;
            color: #333 !important;
        }

        .icon-btn {
            width: 40px; height: 40px;
            background-color: #f4f4f4;
            display: flex; align-items: center; justify-content: center;
            border-radius: 5px; color: #333; cursor: pointer; transition: 0.3s; border: none;
        }
        .icon-btn:hover { background-color: #e0e0e0; }

        /* Profile Image Preview */
        .profile-preview-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto;
        }
        .profile-preview-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 4px solid #76b9d8;
        }
        .upload-icon-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background-color: #1c8233;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid #fff;
            transition: 0.3s;
        }
        .upload-icon-badge:hover {
            background-color: #156627;
        }
    </style>
</head>
<body class="d-flex">

    <!-- Sidebar -->
    <aside class="sidebar offcanvas-md offcanvas-start bg-white border-end position-fixed h-100" tabindex="-1" id="sidebarMenu">
        <div class="offcanvas-header d-md-none border-bottom">
            <h5 class="offcanvas-title fw-bold text-dark">Menu</h5>
            <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column p-0 overflow-auto h-100">
            <div class="p-4 text-center border-bottom w-100">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=e67e22" alt="Profile" class="rounded-circle mb-3" style="width: 80px; height: 80px; object-fit: cover;" id="sidebarProfileImg">
                <h3 class="fs-5 fw-bold text-dark mb-1">tutor B</h3>
                <span class="text-muted small d-block mb-3">teacher</span>
                <a href="profile.html" class="btn bg-purple w-100">View Profile</a>
            </div>
            <nav class="nav flex-column py-3 w-100">
                <a href="index.html" class="nav-link text-secondary py-3 px-4 d-flex align-items-center nav-link-custom"><i class="fas fa-home text-purple fs-5 me-3" style="width: 25px;"></i> home</a>
                <a href="playlists.html" class="nav-link text-secondary py-3 px-4 d-flex align-items-center nav-link-custom"><i class="fas fa-bars-staggered text-purple fs-5 me-3" style="width: 25px;"></i> playlists</a>
                <a href="contents.html" class="nav-link text-secondary py-3 px-4 d-flex align-items-center nav-link-custom"><i class="fas fa-graduation-cap text-purple fs-5 me-3" style="width: 25px;"></i> contents</a>
                <a href="comments.html" class="nav-link text-secondary py-3 px-4 d-flex align-items-center nav-link-custom"><i class="fas fa-comment text-purple fs-5 me-3" style="width: 25px;"></i> comments</a>
                <a href="#" class="nav-link text-secondary py-3 px-4 d-flex align-items-center nav-link-custom"><i class="fas fa-right-from-bracket text-purple fs-5 me-3" style="width: 25px;"></i> logout</a>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content d-flex flex-column min-vh-100 w-100">
        
        <!-- Header -->
        <header class="bg-white border-bottom sticky-top py-3 px-3 px-md-4 d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <button class="icon-btn d-md-none me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu"><i class="fas fa-bars"></i></button>
                <a href="#" class="text-dark fw-bold fs-4 text-decoration-none">Admin.</a>
            </div>
            
            <div class="d-flex gap-2">
                <button class="icon-btn"><i class="fas fa-bell"></i></button>
                <a href="profile.html" class="icon-btn text-decoration-none"><i class="fas fa-user"></i></a>
            </div>
        </header>

        <!-- Update Profile Section -->
        <section class="p-4 p-md-5 flex-grow-1">
            
            <div class="d-flex align-items-center mb-4">
                <h1 class="fs-3 fw-bold text-secondary mb-0"><i class="fas fa-user-edit text-purple me-2"></i> Update Profile</h1>
            </div>

            <div class="row justify-content-center">
                <div class="col-12 col-lg-8 col-xl-7">
                    
                    <div class="card border shadow-sm rounded-3 bg-white p-4 p-md-5">
                        <form action="" method="POST" enctype="multipart/form-data">
                            
                            <!-- Profile Image Upload -->
                            <div class="text-center mb-5">
                                <div class="profile-preview-container mb-3">
                                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=e67e22" alt="Profile Preview" class="rounded-circle shadow-sm" id="profilePreview">
                                    <label for="profilePicInput" class="upload-icon-badge" title="Upload New Picture">
                                        <i class="fas fa-camera"></i>
                                    </label>
                                </div>
                                <input type="file" id="profilePicInput" accept="image/*" class="d-none">
                                <h4 class="fw-bold text-dark mb-1">tutor B</h4>
                                <span class="badge bg-secondary">teacher</span>
                            </div>

                            <hr class="mb-4 text-muted">

                            <!-- Basic Info -->
                            <h5 class="fw-bold text-dark mb-3"><i class="fas fa-info-circle text-purple me-2"></i> Basic Information</h5>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-secondary small">Full Name</label>
                                    <input type="text" class="form-control shadow-none" value="tutor B" placeholder="Enter your name">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-secondary small">Email Address</label>
                                    <input type="email" class="form-control shadow-none" value="teacher.b@example.com" placeholder="Enter your email">
                                </div>
                            </div>

                            <!-- Password Update -->
                            <h5 class="fw-bold text-dark mb-3 mt-4"><i class="fas fa-lock text-purple me-2"></i> Change Password</h5>
                            <div class="row g-3 mb-4">
                                <div class="col-12">
                                    <label class="form-label fw-bold text-secondary small">Current Password</label>
                                    <input type="password" class="form-control shadow-none" placeholder="Enter current password to verify">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-secondary small">New Password</label>
                                    <input type="password" class="form-control shadow-none" placeholder="Enter new password">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-secondary small">Confirm New Password</label>
                                    <input type="password" class="form-control shadow-none" placeholder="Confirm new password">
                                </div>
                            </div>

                            <!-- Action Buttons -->
                            <div class="d-flex gap-3 mt-5">
                                <button type="submit" class="btn bg-purple text-white flex-grow-1 fw-bold py-2"><i class="fas fa-save me-2"></i> Save Changes</button>
                                <a href="index.html" class="btn btn-light border text-dark px-4 fw-bold py-2">Cancel</a>
                            </div>

                        </form>
                    </div>

                </div>
            </div>

        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS for Profile Picture Preview -->
    <script>
        document.getElementById('profilePicInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // ပုံအသစ်ကို Preview အကွက်မှာ ပြောင်းထည့်ပေးမည်
                    document.getElementById('profilePreview').src = e.target.result;
                    // Sidebar က ပုံလေးကိုပါ တစ်ပါတည်း ပြောင်းပေးမည် (Optional)
                    document.getElementById('sidebarProfileImg').src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
