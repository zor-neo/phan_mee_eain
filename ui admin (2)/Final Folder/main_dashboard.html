<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard (Responsive Fixed)</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f4f4f4;
        }

        .text-purple { color: #A9D1E4 !important; }
        .bg-purple { background-color: #A9D1E4 !important; color: #fff; }
        .bg-purple:hover { background-color: #99cbe2 !important; color: #fff; }
        .bg-orange { background-color: #f39c12 !important; color: #fff; }
        .bg-orange:hover { background-color: #e67e22 !important; color: #fff; }

        /* Sidebar Width Control */
        .sidebar {
            width: 250px;
            z-index: 1045;
        }
        
        /* Desktop Layout Control */
        @media (min-width: 768px) {
            .main-content {
                margin-left: 250px;
                width: calc(100% - 250px);
            }
        }

        .nav-link-custom:hover {
            background-color: #f4f4f4;
            color: #333 !important;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            background-color: #f4f4f4;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            color: #333;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }
        .icon-btn:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body class="d-flex">

    <!-- Responsive Sidebar (Offcanvas for mobile, Fixed for Desktop) -->
    <aside class="sidebar offcanvas-md offcanvas-start bg-white border-end position-fixed h-100" tabindex="-1" id="sidebarMenu">
        
        <!-- Mobile Close Button Header -->
        <div class="offcanvas-header d-md-none border-bottom">
            <h5 class="offcanvas-title fw-bold text-dark">Menu</h5>
            <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu" aria-label="Close"></button>
        </div>

        <div class="offcanvas-body d-flex flex-column p-0 overflow-auto h-100">
            <!-- Profile Info -->
            <div class="p-4 text-center border-bottom w-100">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=e67e22" alt="Profile Image" class="rounded-circle mb-3" style="width: 80px; height: 80px; object-fit: cover;">
                <h3 class="fs-5 fw-bold text-dark mb-1">tutor B</h3>
                <span class="text-muted small d-block mb-3">teacher</span>
                <a href="#" class="btn bg-purple w-100">View Profile</a>
            </div>
            
            <!-- Navigation Links -->
            <nav class="nav flex-column py-3 w-100">
                <a href="#" class="nav-link text-secondary py-3 px-4 d-flex align-items-center nav-link-custom">
                    <i class="fas fa-home text-purple fs-5 me-3" style="width: 25px;"></i> home
                </a>
                <a href="#" class="nav-link text-secondary py-3 px-4 d-flex align-items-center nav-link-custom">
                    <i class="fas fa-bars-staggered text-purple fs-5 me-3" style="width: 25px;"></i> playlists
                </a>
                <a href="#" class="nav-link text-secondary py-3 px-4 d-flex align-items-center nav-link-custom">
                    <i class="fas fa-graduation-cap text-purple fs-5 me-3" style="width: 25px;"></i> contents
                </a>
                <a href="#" class="nav-link text-secondary py-3 px-4 d-flex align-items-center nav-link-custom">
                    <i class="fas fa-comment text-purple fs-5 me-3" style="width: 25px;"></i> comments
                </a>
                <a href="#" class="nav-link text-secondary py-3 px-4 d-flex align-items-center nav-link-custom">
                    <i class="fas fa-right-from-bracket text-purple fs-5 me-3" style="width: 25px;"></i> logout
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content d-flex flex-column min-vh-100 w-100">
        
        <!-- Header Section -->
        <header class="bg-white border-bottom sticky-top py-3 px-3 px-md-4 d-flex justify-content-between align-items-center">
            
            <div class="d-flex align-items-center">
                <!-- Mobile Menu Toggle Button (Visible only on mobile) -->
                <button class="icon-btn d-md-none me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                    <i class="fas fa-bars"></i>
                </button>
                <a href="#" class="text-dark fw-bold fs-4 text-decoration-none">Admin.</a>
            </div>

            <!-- Action Icons -->
            <div class="d-flex gap-2">
                <button class="icon-btn"><i class="fas fa-user"></i></button>
                <button class="icon-btn"><i class="fas fa-gear"></i></button>
            </div>
        </header>

        <!-- Dashboard Content -->
        <section class="p-4 p-md-5 flex-grow-1">
            <h1 class="fs-3 fw-bold text-secondary mb-4">Dashboard</h1>

            <div class="row g-4">
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card p-4 text-center border shadow-sm h-100 rounded-3">
                        <h3 class="fs-4 fw-medium text-dark mb-3">Welcome!</h3>
                        <p class="bg-light p-2 rounded text-muted mb-4">Admin A</p>
                        <a href="#" class="btn bg-purple w-100 mt-auto">View Profile</a>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card p-4 text-center border shadow-sm h-100 rounded-3">
                        <h3 class="fs-4 fw-medium text-dark mb-3">8</h3>
                        <p class="bg-light p-2 rounded text-muted mb-4">total contents</p>
                        <a href="#" class="btn bg-purple w-100 mt-auto">Add New Content</a>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card p-4 text-center border shadow-sm h-100 rounded-3">
                        <h3 class="fs-4 fw-medium text-dark mb-3">5</h3>
                        <p class="bg-light p-2 rounded text-muted mb-4">total playlists</p>
                        <a href="#" class="btn bg-purple w-100 mt-auto">Add New Playlist</a>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Bootstrap JS (Must include for buttons to work) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
